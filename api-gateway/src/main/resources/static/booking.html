<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="assets/img/favicon.png" rel="icon">
    <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="https://fonts.googleapis.com" rel="preconnect">

    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/vendor/aos/aos.css" rel="stylesheet">

</head>

<body class="index-page">

<header id="header" class="header sticky-top" data-include="header.html"></header>

<main class="main">
    <section class="booking-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-9">
                    <div class="booking-card mx-auto">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-primary"><i class="bi bi-calendar2-check me-2"></i>Programare Nouă</h3>
                            <p class="text-muted">Alege specializarea, medicul și selectează un interval disponibil.</p>
                        </div>

                        <form id="booking-form">
                            <input type="date" id="appointment-date" required style="display: none;">
                            <select id="appointment-time" required style="display: none;">
                                <option value=""></option>
                            </select>

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label for="specialization" class="form-label fw-bold">1. Alege Specializarea</label>
                                    <select class="form-select form-select-lg" id="specialization" required>
                                        <option value="" selected disabled>Se încarcă...</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label for="doctor" class="form-label fw-bold">2. Alege Medicul</label>
                                    <select class="form-select form-select-lg" id="doctor" required disabled>
                                        <option value="" selected disabled>Alege întâi specializarea</option>
                                    </select>
                                </div>

                                <div class="col-12 mt-4">
                                    <label class="form-label fw-bold">3. Zile Disponibile</label>
                                    <div id="days-container" class="d-flex flex-wrap gap-2">
                                        <div class="text-muted small px-2 py-1 bg-light rounded"><i class="bi bi-info-circle me-1"></i> Selectează medicul pentru a vedea zilele libere...</div>
                                    </div>
                                </div>

                                <div class="col-12 mt-4">
                                    <label class="form-label fw-bold">4. Ore Disponibile</label>
                                    <div id="hours-container" class="d-flex flex-wrap gap-2">
                                        <div class="text-muted small px-2 py-1 bg-light rounded"><i class="bi bi-info-circle me-1"></i> Selectează data pentru a vedea orele...</div>
                                    </div>
                                </div>

                                <div class="col-12 mt-5 text-center">
                                    <hr class="mb-4">
                                    <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold rounded-pill shadow-sm">
                                        <i class="bi bi-check-circle me-2"></i>Confirmă Programarea
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>
<div data-include="footer.html"></div>

<script src="assets/js/loader.js"></script>
<script src="assets/js/booking.js"></script>
<script src="assets/js/chatbot.js"></script>

</body>
</html>
